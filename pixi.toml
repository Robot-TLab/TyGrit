[workspace]
authors = ["Hu Tianrun <tianrunhu@gmail.com>"]
channels = ["conda-forge", "robostack-staging"]
name = "TyGrit"
platforms = ["linux-64"]
version = "0.1.0"

# ── shared base (inherited unless no-default-feature=true) ─────────────
# Keep this small: only deps needed to import TyGrit and run pure-Python
# unit tests. Heavier stacks live in dedicated features below.

[dependencies]
python = "3.11.*"
pip = ">=25.3,<26"
numpy = ">=1.26,<2"
scipy = ">=1.11,<2"
loguru = ">=0.7,<1"
pytest = ">=9.0.3,<10"

[pypi-dependencies]
tygrit = { path = ".", editable = true }

[tasks]
test = { cmd = "pytest", env = { PYTHONPATH = "${workspace}:${workspace}/build" } }

# ── maniskill (torch + mani-skill + cuda) ──────────────────────────────
# Shared base for every env that imports the ManiSkill simulator: rl,
# world, thirdparty. Extracted so torch/cuda specs live in one place.

[feature.maniskill.dependencies]
cuda-toolkit = "12.8.*"

[feature.maniskill.pypi-dependencies]
torch = { version = "==2.7.0", index = "https://download.pytorch.org/whl/cu128" }
mani-skill = ">=3.0.0b0, <4"

# Route ManiSkill's asset downloads and lookups to a project-local
# directory instead of the user-global ~/.maniskill/ cache. This
# keeps every sim's asset footprint visible inside the repo tree
# (`assets/maniskill/`, future `assets/genesis/`, …) and makes fresh
# clones' missing-asset state obvious via `ls`. ManiSkill appends
# `/data` and `/demos` subdirs to MS_ASSET_DIR on its own, so scenes
# end up at `assets/maniskill/data/scene_datasets/<dataset>/...`.
[feature.maniskill.activation.env]
MS_ASSET_DIR = "$PIXI_PROJECT_ROOT/assets/maniskill"

# ── rl (lightweight RL training) ───────────────────────────────────────
# Composes: default + maniskill + rl. Minimal delta over maniskill.

[feature.rl.dependencies]
wandb = ">=0.25.0,<0.26"
setuptools = "<81"

[feature.rl.pypi-dependencies]
tensordict = ">=0.11.0, <0.12"

# ── world (scene/world generation + ManiSkill scene-builder adapter) ───
# Composes: default + maniskill + world. Deps for manifest generation
# and the SpecBackedSceneBuilder (Step 4+). Start lean; add as needed.

[feature.world.dependencies]
setuptools = "<81"

[feature.world.pypi-dependencies]
trimesh = ">=4"

[feature.world.tasks]
# Download ManiSkill-shipped scene datasets to $PIXI_PROJECT_ROOT/assets/maniskill.
# The MS_ASSET_DIR env var (set by [feature.maniskill.activation.env]) tells
# mani_skill's download_asset where to write, so these tasks always land in
# the project-local cache regardless of where the user's home directory is.
# -y disables the "create target dir?" prompt — safe because the path is
# inside the repo.
download-ai2thor = "python -m mani_skill.utils.download_asset AI2THOR -y"
download-replicacad = "python -m mani_skill.utils.download_asset ReplicaCAD -y"
download-robocasa = "python -m mani_skill.utils.download_asset RoboCasa -y"

# ── thirdparty (one-shot install tasks for VAMP/GraspGen/MomaViz/SAM3) ─
# This env is rarely activated — only for `pixi run -e thirdparty install-*`
# at setup time. Bundles the C++ build stack (eigen/nlopt/orocos-kdl/…)
# and the heavy pypi deps those packages pull in.

[feature.thirdparty.dependencies]
# C++ build stack: VAMP, pytracik, ikfast, GraspGen/pointnet2_ops all
# compile native extensions at install time.
eigen = ">=3.4.0,<4"
nlopt = ">=2.10.0,<3"
orocos-kdl = ">=1.5.3,<2"
pybind11 = ">=3.0.1,<4"
cmake = ">=3.28,<4"
scikit-build-core = ">=0.11,<1"
nanobind = ">=2.4,<3"
ninja = ">=1.13.2,<2"
setuptools = "<81"
tomli = ">=2.4.0,<3"
tomli-w = ">=1.2.0,<2"
gh = ">=2.86.0,<3"

[feature.thirdparty.pypi-dependencies]
py-trees = ">=2.2,<3"
torchvision = "==0.22.0"
scikit-learn = ">=1.8.0, <2"
hydra-core = ">=1.3.2, <2"
trimesh = ">=4"
timm = ">=1.0.24, <2"
addict = ">=2.4.0, <3"
pyrender = ">=0.1.45, <0.2"
h5py = ">=3.15.1, <4"
omegaconf = ">=2.3.0, <3"
meshcat = ">=0.3.2, <0.4"
tensordict = ">=0.11.0, <0.12"
sharedarray = ">=3.2.4, <4"
webdataset = ">=1.0.2, <2"
yourdfpy = "==0.0.56"
tensorboardx = ">=2.6.4, <3"
tensorboard = ">=2.20.0, <3"
diffusers = ">=0.25, <1"

[feature.thirdparty.tasks]
install-vamp = "pip install --no-build-isolation -e thirdparty/vamp_preview"
install-graspgen = "pip install --no-build-isolation thirdparty/GraspGen/pointnet2_ops && pip install --no-build-isolation --no-deps -e thirdparty/GraspGen"
install-momaviz = "pip install --no-deps -e thirdparty/MomaViz"
download-graspgen-weights = "scripts/download_graspgen_weights.sh"
install-extensions = "pip install torch-scatter -f https://data.pyg.org/whl/torch-2.7.0+cu128.html && pip install spconv-cu120 && pip install sam3@git+https://github.com/facebookresearch/sam3.git"

# Note: a `robot` feature/env for ROS (ros-humble-desktop) is NOT
# defined here. Pixi warns about unused features, so we add it only
# when someone genuinely needs to drive real hardware. The one-liner
# to introduce it is:
#
#   pixi add --feature robot ros-humble-desktop
#   # then manually add `robot = ["maniskill", "robot"]` under [environments]
#
# ros-humble-desktop is ~2 GB and resolving it bloats pixi.lock, so
# keeping it out of the default dev loop is worth the one-time cost
# of re-adding when the real-robot work lands.

# ── docs ───────────────────────────────────────────────────────────────

[feature.docs.pypi-dependencies]
sphinx = ">=7,<9"
furo = ">=2024"
myst-parser = ">=3,<5"
sphinx-copybutton = ">=0.5"
sphinx-design = ">=0.6"

[feature.docs.tasks]
docs = { cmd = "sphinx-build docs docs/_build/html", env = { PYTHONPATH = "${workspace}:${workspace}/build" } }

# ── lint ───────────────────────────────────────────────────────────────

[feature.lint.dependencies]
python = "3.11.*"
pre-commit = "*"
black = "*"
ruff = "*"

# ── ci (GitHub Actions slim test env, no CUDA/torch) ───────────────────

[feature.ci.dependencies]
eigen = ">=3.4.0,<4"
nlopt = ">=2.10.0,<3"
orocos-kdl = ">=1.5.3,<2"
pybind11 = ">=3.0.1,<4"
matplotlib-base = "*"
boost = ">=1.85.0,<2"

[feature.ci.pypi-dependencies]
py-trees = ">=2.2,<3"
opencv-python-headless = ">=4.8,<5"

# ── environments ───────────────────────────────────────────────────────

[environments]
default    = []
lint       = { features = ["lint"], no-default-feature = true }
docs       = ["docs"]
rl         = ["maniskill", "rl"]
world      = ["maniskill", "world"]
thirdparty = ["maniskill", "thirdparty"]
ci         = ["ci"]
