[workspace]
authors = ["Hu Tianrun <tianrunhu@gmail.com>"]
channels = ["conda-forge", "robostack-staging"]
name = "TyGrit"
platforms = ["linux-64"]
version = "0.1.0"


# ── shared base (inherited unless no-default-feature=true) ─────────────
# Keep this small: only deps needed to import TyGrit and run pure-Python
# unit tests. Heavier stacks live in dedicated features below.

[dependencies]
python = "3.11.*"
pip = ">=25.3,<26"
numpy = ">=1.26,<2"
scipy = ">=1.11,<2"
loguru = ">=0.7,<1"
pytest = ">=9.0.3,<10"

[pypi-dependencies]
tygrit = { path = ".", editable = true }

[tasks]
test = { cmd = "pytest", env = { PYTHONPATH = "${workspace}:${workspace}/build" } }
setup-fetch-sim = { cmd = "mkdir -p resources/fetch/sim; test -e resources/fetch/sim/fetch.urdf || cp .pixi/envs/world/lib/python3.11/site-packages/mani_skill/assets/robots/fetch/fetch.urdf resources/fetch/sim/; test -d resources/fetch/sim/fetch_description || cp -r .pixi/envs/world/lib/python3.11/site-packages/mani_skill/assets/robots/fetch/fetch_description resources/fetch/sim/", default-environment = "world" }

# ── maniskill (torch + mani-skill + cuda) ──────────────────────────────
# Shared base for every env that imports the ManiSkill simulator: rl,
# world, thirdparty. Extracted so torch/cuda specs live in one place.

[feature.maniskill.dependencies]
cuda-toolkit = "12.8.*"

[feature.maniskill.pypi-dependencies]
torch = { version = "==2.7.0", index = "https://download.pytorch.org/whl/cu128" }
mani-skill = ">=3.0.0b0, <4"

# Route ManiSkill's asset downloads and lookups to a project-local
# directory instead of the user-global ~/.maniskill/ cache. This
# keeps every sim's asset footprint visible inside the repo tree
# (`assets/maniskill/`, future `assets/genesis/`, …) and makes fresh
# clones' missing-asset state obvious via `ls`. ManiSkill appends
# `/data` and `/demos` subdirs to MS_ASSET_DIR on its own, so scenes
# end up at `assets/maniskill/data/scene_datasets/<dataset>/...`.
[feature.maniskill.activation.env]
MS_ASSET_DIR = "$PIXI_PROJECT_ROOT/assets/maniskill"

# ── rl (lightweight RL training) ───────────────────────────────────────
# Composes: default + maniskill + rl. Minimal delta over maniskill.

[feature.rl.dependencies]
wandb = ">=0.25.0,<0.26"
setuptools = "<81"

[feature.rl.pypi-dependencies]
tensordict = ">=0.11.0, <0.12"

# ── world (scene/world generation + ManiSkill scene-builder adapter) ───
# Composes: default + maniskill + world. Deps for manifest generation
# and the SpecBackedSceneBuilder (Step 4+). Start lean; add as needed.

[feature.world.dependencies]
setuptools = "<81"

[feature.world.pypi-dependencies]
trimesh = ">=4"
objaverse = ">=0.1.7, <0.2"
molmospaces-resources = ">=0.0.1b4"
huggingface-hub = ">=1.10.1, <2"
mujoco = ">=3.6.0, <4"

[feature.world.tasks]
# Download ManiSkill-shipped scene datasets to $PIXI_PROJECT_ROOT/assets/maniskill.
# The MS_ASSET_DIR env var (set by [feature.maniskill.activation.env]) tells
# mani_skill's download_asset where to write, so these tasks always land in
# the project-local cache regardless of where the user's home directory is.
# -y disables the "create target dir?" prompt — safe because the path is
# inside the repo.
download-ai2thor = "python -m mani_skill.utils.download_asset AI2THOR -y"
download-replicacad = "python -m mani_skill.utils.download_asset ReplicaCAD -y"
download-robocasa = "python -m mani_skill.utils.download_asset RoboCasa -y"
download-ycb = "python -m mani_skill.utils.download_asset ycb -y"
generate-objaverse-objects = "python -m TyGrit.worlds.generators.objaverse"
generate-holodeck-scenes = "python -m TyGrit.worlds.generators.holodeck"
# AllenAI's MJCF→Sapien loader for Holodeck scenes. Vendored as a
# submodule under thirdparty/molmospaces because the package is not
# published on PyPI. --no-deps skips its declared mani-skill-nightly
# requirement (the loader actually only uses public mani_skill APIs
# present in our stable mani-skill 3.x); mujoco (the parser dep) is
# in [feature.world.pypi-dependencies] above.
install-molmo-spaces-maniskill = "pip install --no-deps -e thirdparty/molmospaces/molmo_spaces_maniskill"

# ── thirdparty (one-shot install tasks for VAMP/GraspGen/MomaViz/SAM3) ─
# This env is rarely activated — only for `pixi run -e thirdparty install-*`
# at setup time. Bundles the C++ build stack (eigen/nlopt/orocos-kdl/…)
# and the heavy pypi deps those packages pull in.

[feature.thirdparty.dependencies]
# C++ build stack: VAMP, pytracik, ikfast, GraspGen/pointnet2_ops all
# compile native extensions at install time.
eigen = ">=3.4.0,<4"
nlopt = ">=2.10.0,<3"
orocos-kdl = ">=1.5.3,<2"
pybind11 = ">=3.0.1,<4"
cmake = ">=3.28,<4"
scikit-build-core = ">=0.11,<1"
nanobind = ">=2.4,<3"
ninja = ">=1.13.2,<2"
setuptools = "<81"
tomli = ">=2.4.0,<3"
tomli-w = ">=1.2.0,<2"
gh = ">=2.86.0,<3"

[feature.thirdparty.pypi-dependencies]
py-trees = ">=2.2,<3"
torchvision = "==0.22.0"
scikit-learn = ">=1.8.0, <2"
hydra-core = ">=1.3.2, <2"
trimesh = ">=4"
timm = ">=1.0.24, <2"
addict = ">=2.4.0, <3"
pyrender = ">=0.1.45, <0.2"
h5py = ">=3.15.1, <4"
omegaconf = ">=2.3.0, <3"
meshcat = ">=0.3.2, <0.4"
tensordict = ">=0.11.0, <0.12"
sharedarray = ">=3.2.4, <4"
webdataset = ">=1.0.2, <2"
yourdfpy = "==0.0.56"
tensorboardx = ">=2.6.4, <3"
tensorboard = ">=2.20.0, <3"
diffusers = ">=0.25, <1"

[feature.thirdparty.tasks]
install-vamp = "pip install --no-build-isolation -e thirdparty/vamp_preview"
install-graspgen = "pip install --no-build-isolation thirdparty/GraspGen/pointnet2_ops && pip install --no-build-isolation --no-deps -e thirdparty/GraspGen"
install-momaviz = "pip install --no-deps -e thirdparty/MomaViz"
download-graspgen-weights = "scripts/download_graspgen_weights.sh"
install-extensions = "pip install torch-scatter -f https://data.pyg.org/whl/torch-2.7.0+cu128.html && pip install spconv-cu120 && pip install sam3@git+https://github.com/facebookresearch/sam3.git"

# Note: a `robot` feature/env for ROS (ros-humble-desktop) is NOT
# defined here. Pixi warns about unused features, so we add it only
# when someone genuinely needs to drive real hardware. The one-liner
# to introduce it is:
#
#   pixi add --feature robot ros-humble-desktop
#   # then manually add `robot = ["maniskill", "robot"]` under [environments]
#
# ros-humble-desktop is ~2 GB and resolving it bloats pixi.lock, so
# keeping it out of the default dev loop is worth the one-time cost
# of re-adding when the real-robot work lands.

# ── docs ───────────────────────────────────────────────────────────────

[feature.docs.pypi-dependencies]
sphinx = ">=7,<9"
furo = ">=2024"
myst-parser = ">=3,<5"
sphinx-copybutton = ">=0.5"
sphinx-design = ">=0.6"

[feature.docs.tasks]
docs = { cmd = "sphinx-build docs docs/_build/html", env = { PYTHONPATH = "${workspace}:${workspace}/build" } }

# ── lint ───────────────────────────────────────────────────────────────

[feature.lint.dependencies]
python = "3.11.*"
pre-commit = "*"
black = "*"
ruff = "*"

# ── ci (GitHub Actions slim test env, no CUDA/torch) ───────────────────

[feature.ci.dependencies]
eigen = ">=3.4.0,<4"
nlopt = ">=2.10.0,<3"
orocos-kdl = ">=1.5.3,<2"
pybind11 = ">=3.0.1,<4"
matplotlib-base = "*"
boost = ">=1.85.0,<2"

[feature.ci.pypi-dependencies]
py-trees = ">=2.2,<3"
opencv-python-headless = ">=4.8,<5"

[feature.genesis.dependencies]
# Genesis env uses no-default-feature = true (see [environments]) to
# avoid the default feature's numpy pin conflicting with genesis-world's
# torch 2.10+ constraint. Declare its own base Python here.
python = "3.11.*"
pip = ">=25.3,<26"
pytest = ">=9.0.3,<10"

[feature.genesis.pypi-dependencies]
tygrit = { path = ".", editable = true }
loguru = ">=0.7,<1"
scipy = ">=1.11,<2"
numpy = ">=1.26,<2"
genesis-world = "*"
torch = ">=2.10.0, <3"

# ── isaacsim (Isaac Sim 5.1 + CUDA torch 2.7) ──────────────────────────
# Separate env like genesis because NVIDIA's omniverse-kit base layer
# pins its own USD/pxr stack and doesn't play well composed with
# mani-skill's sapien-based build. Install gets ~9 GB of kit extensions
# into the pixi env cache; expect the first `pixi install -e isaacsim`
# to take a while. Needs a CUDA 12.x RTX GPU; won't import on CPU-only
# boxes. The EULA acceptance env var is set at env activation time.

[feature.isaacsim.dependencies]
# Minimum conda base for the isolated isaacsim env (see `no-default-feature
# = true` under [environments]). ONLY python + setuptools pinned conda-side.
#
# Background: NVIDIA's isaacsim-* wheels pin very tight versions of
# numpy / packaging / typing_extensions. pixi's solver treats every
# conda package (even `pip` itself) as a hard constraint on the pypi
# side of the solve, because conda's pip transitively depends on
# packaging etc. That exposed a real bug:
#
#   isaacsim-core==5.1.0.0 depends on packaging==23.0 and packaging==26.0
#
# — meaning NVIDIA's wheel metadata has TWO contradictory packaging
# constraints, and any conda pin of packaging (via pip) tips the solver
# into the 26.0 branch which collides with isaacsim's own 23.0 pin.
# We avoid this by NOT declaring `pip` on the conda side here and
# letting uv (pixi's pypi solver) ship its own pip to install editable
# pypi deps into this env.
#
# setuptools is added so that `flatdict` (a transitive isaaclab dep
# whose 4.0.1 sdist imports `pkg_resources` at build time without
# declaring it) can build under ``no-build-isolation``: with isolation
# disabled uv reuses this env's setuptools instead of failing on a
# clean build env.
python = "3.11.*"
setuptools = ">=70"

[feature.isaacsim.pypi-dependencies]
tygrit = { path = ".", editable = true }
loguru = ">=0.7,<1"
scipy = ">=1.11,<2"
pytest = ">=9.0.3,<10"
# Pillow + numpy MUST match isaacsim_kernel 5.0.0's exact pins
# (Pillow==11.2.1, numpy==1.26.0). Pre-pin them on the pypi side so
# uv chooses those exact versions; otherwise Isaac Lab's pillow
# upgrade collides at solve time.
Pillow = "==11.2.1"
numpy = "==1.26.0"
torch = { version = "==2.7.0", index = "https://download.pytorch.org/whl/cu128" }
# isaacsim with the [extscache] extra — extscache_kit /
# extscache_physics / extscache_kit_sdk supply the omniverse-kit
# extension binaries the ``isaacsim`` package itself loads at import
# time (``simulation_app`` etc.). Without [extscache], `import
# isaacsim` raises IndexError because the extensions dir is empty.
# The [all] extra is intentionally dropped — it adds replicator/ros
# packages that we don't use today and that worsen the solve.
# Need [all]+[extscache] together: [all] pulls isaacsim-app (which
# provides simulation_app), [extscache] pulls the omniverse-kit
# extension binaries. Without app, `import isaacsim` raises
# IndexError because expose_api can't find simulation_app on disk.
isaacsim = { version = "==5.0.0", extras = ["all", "extscache"], index = "https://pypi.nvidia.com" }
# warp-lang is pulled in transitively by Isaac Lab. Declared here so
# the install-isaaclab task below doesn't have to manage it.
warp-lang = ">=1.12,<2"

# IMPORTANT — Isaac Lab is NOT declared as a pypi-dep here. Two
# upstream issues block a `pixi install`-only path on pixi 0.63.x:
#
# 1. isaaclab core pins ``pillow==11.3.0`` while isaacsim 5.0 pins
#    ``11.2.1``; pixi's per-feature ``pypi-options.dependency-overrides``
#    is the right surgery (validated by manifest schema), but the solver
#    still chooses the upstream pin during git-source resolution.
# 2. Even with an override, isaaclab transitively builds
#    ``flatdict==4.0.1`` from sdist; flatdict's setup.py imports
#    ``pkg_resources`` without declaring setuptools as a build dep.
#    Pixi 0.63 doesn't yet pass ``no-build-isolation`` (whole-workspace
#    or per-package) to its bundled uv during ``pixi install`` — the
#    feature exists in `[pypi-options]` but the value is ignored at
#    install time. Tracked upstream under
#    https://github.com/prefix-dev/pixi/pull/3657 / #4247.
#
# Until both land, run `pixi run -e isaacsim install-isaaclab` (defined
# under [feature.isaacsim.tasks] below) once after `pixi install -e
# isaacsim`. The task runs entirely inside this pixi env — no raw
# machine python or sudo needed.


# NVIDIA ships Isaac Sim wheels tagged manylinux_2_35_x86_64. pixi's
# default glibc floor is 2.17 (manylinux_2_17), which excludes those
# wheels even on systems that have newer glibc. Declare the real floor
# for this feature so pixi picks the right wheels. Confirmed 2.35+ on
# any Ubuntu 22.04-class host; fails to resolve on older CentOS boxes,
# which is correct behaviour since Isaac Sim genuinely doesn't ship
# wheels for them.
[feature.isaacsim.system-requirements]
libc = { family = "glibc", version = "2.35" }

[feature.isaacsim.activation.env]
OMNI_KIT_ACCEPT_EULA = "Yes"

[feature.isaacsim.tasks]
# One-shot Isaac Lab install. Runs *inside* the isaacsim pixi env
# (the script uses ``$CONDA_PREFIX/bin/python`` which is the env's own
# interpreter — no raw-machine python touched). The script clones
# Isaac Lab v2.3.1 if missing, bootstraps pip into the env's venv,
# then `pip install --no-build-isolation --no-deps` to pick up the
# isaaclab module without re-resolving conflicting deps. The
# --no-build-isolation flag uses the env's setuptools (declared as
# a conda dep above) so flatdict's broken build metadata works.
install-isaaclab = "python tools/install_isaaclab.py"

# ── environments ───────────────────────────────────────────────────────

[environments]
default    = []
lint       = { features = ["lint"], no-default-feature = true }
docs       = ["docs"]
rl         = ["maniskill", "rl"]
world      = ["maniskill", "world"]
thirdparty = ["maniskill", "thirdparty"]
ci         = ["ci"]
# Genesis is an alternative physics engine — NOT composed with
# maniskill because the two sims don't share a scene/actor API
# and pinning torch/cuda twice in one env risks resolution
# conflicts. `no-default-feature = true` so the default feature's
# numpy pin doesn't clash with genesis-world's dependency tree;
# the genesis feature re-declares its own minimal base (python,
# numpy, scipy, loguru). Pure-Python core (types, utils, samplers,
# robot cores) remains importable in both envs.
genesis  = { features = ["genesis"], no-default-feature = true }
isaacsim = { features = ["isaacsim"], no-default-feature = true }
